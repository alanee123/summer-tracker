<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>☀️ Летний трекер</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  :root{
    --bg:#0c0c14; --panel:#14141e; --panel-2:#1b1b27; --input:#21212f;
    --border:#2a2a3a; --text:#ececf4; --dim:#9292ac; --faint:#62627a;
    --accent:#7c6fff; --accent-2:#9d92ff;
    --sport:#38bdf8; --study:#7c6fff; --health:#4ade80; --hobby:#ff6b9d; --other:#fbbf24;
    --radius:16px; --radius-sm:11px;
  }
  html,body{height:100%;}
  body{
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Inter,Helvetica,sans-serif;
    background:var(--bg); color:var(--text);
    background-image:radial-gradient(1200px 500px at 80% -10%, rgba(124,111,255,.16), transparent 60%),
                     radial-gradient(900px 500px at -10% 10%, rgba(56,189,248,.10), transparent 55%);
    background-attachment:fixed;
    min-height:100vh; -webkit-font-smoothing:antialiased;
  }
  button{font-family:inherit; cursor:pointer; border:none; background:none; color:inherit;}
  input,select{font-family:inherit;}
  ::selection{background:rgba(124,111,255,.4);}

  .app{display:flex; min-height:100vh;}

  /* ---------- Sidebar ---------- */
  .sidebar{
    width:248px; flex:none; position:sticky; top:0; align-self:flex-start;
    height:100vh; background:rgba(20,20,30,.7); backdrop-filter:blur(8px);
    border-right:1px solid var(--border); padding:22px 16px;
    display:flex; flex-direction:column; gap:6px;
  }
  .brand{display:flex; align-items:center; gap:9px; font-size:20px; font-weight:800; padding:6px 10px 18px; letter-spacing:-.3px;}
  .brand span{background:linear-gradient(90deg,var(--accent-2),var(--sport)); -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent;}
  nav{display:flex; flex-direction:column; gap:4px;}
  .nav-item{
    display:flex; align-items:center; gap:12px; width:100%; text-align:left;
    padding:11px 13px; border-radius:var(--radius-sm); font-size:15px; font-weight:600;
    color:var(--dim); transition:all .18s ease;
  }
  .nav-item:hover{background:var(--panel-2); color:var(--text);}
  .nav-item.active{background:rgba(124,111,255,.16); color:var(--text); box-shadow:inset 2px 0 0 var(--accent);}
  .nav-ic{font-size:18px; width:22px; text-align:center;}
  .streak-badge{
    margin-top:auto; background:linear-gradient(135deg, rgba(255,107,157,.16), rgba(251,191,36,.14));
    border:1px solid var(--border); border-radius:var(--radius); padding:16px; text-align:center;
  }
  .streak-num{font-size:30px; font-weight:800;}
  .streak-lbl{font-size:12px; color:var(--dim); margin-top:2px; text-transform:uppercase; letter-spacing:.6px;}

  /* ---------- Main ---------- */
  main{flex:1; padding:34px 44px 70px; max-width:1080px; width:100%;}
  .page-head{display:flex; align-items:flex-end; justify-content:space-between; gap:16px; margin-bottom:24px; flex-wrap:wrap;}
  .page-title{font-size:27px; font-weight:800; letter-spacing:-.5px;}
  .page-sub{color:var(--dim); font-size:14px; margin-top:3px;}

  .btn{
    display:inline-flex; align-items:center; gap:7px; padding:10px 16px; border-radius:11px;
    font-size:14px; font-weight:600; transition:all .16s ease; white-space:nowrap;
  }
  .btn.primary{background:var(--accent); color:#fff;}
  .btn.primary:hover{background:var(--accent-2);}
  .btn.ghost{background:var(--panel-2); color:var(--text); border:1px solid var(--border);}
  .btn.ghost:hover{background:var(--input);}
  .btn.sm{padding:7px 12px; font-size:13px;}

  .icon-btn{
    width:34px; height:34px; border-radius:10px; display:inline-flex; align-items:center; justify-content:center;
    background:var(--panel-2); border:1px solid var(--border); color:var(--dim); font-size:15px; transition:all .16s ease;
  }
  .icon-btn:hover{background:var(--input); color:var(--text);}

  .card{background:var(--panel); border:1px solid var(--border); border-radius:var(--radius); padding:20px;}
  .grid{display:grid; gap:16px;}

  /* progress bars */
  .bar{height:10px; border-radius:99px; background:var(--input); overflow:hidden;}
  .bar > i{display:block; height:100%; border-radius:99px; background:var(--accent); transition:width .25s ease;}

  /* ---------- Home ---------- */
  .hero{
    background:linear-gradient(135deg, rgba(124,111,255,.18), rgba(56,189,248,.10));
    border:1px solid var(--border); border-radius:var(--radius); padding:24px 26px; margin-bottom:20px;
  }
  .hero h2{font-size:22px; font-weight:800; letter-spacing:-.4px;}
  .hero .date{color:var(--dim); margin-top:2px; font-size:15px;}
  .summer{margin-top:20px;}
  .summer .row{display:flex; justify-content:space-between; font-size:13px; color:var(--dim); margin-bottom:8px;}
  .summer .row b{color:var(--text);}
  .metrics{display:grid; grid-template-columns:repeat(4,1fr); gap:14px; margin-bottom:20px;}
  .metric{background:var(--panel); border:1px solid var(--border); border-radius:var(--radius); padding:18px;}
  .metric .v{font-size:30px; font-weight:800; line-height:1;}
  .metric .k{color:var(--dim); font-size:13px; margin-top:8px;}
  .metric .ic{font-size:20px; margin-bottom:10px; display:block;}

  /* task row */
  .task-row{
    display:flex; align-items:center; gap:13px; padding:13px 15px; border-radius:var(--radius-sm);
    background:var(--panel-2); border:1px solid var(--border); transition:all .18s ease; cursor:pointer; margin-bottom:9px;
  }
  .task-row:hover{border-color:var(--accent);}
  .task-row .check{
    width:24px; height:24px; flex:none; border-radius:7px; border:2px solid var(--faint);
    display:flex; align-items:center; justify-content:center; font-size:14px; color:#fff; transition:all .18s ease;
  }
  .task-row.done .check{background:var(--accent); border-color:var(--accent);}
  .task-row .emoji{font-size:20px;}
  .task-row .t-name{font-weight:600; flex:1;}
  .task-row.done .t-name{text-decoration:line-through; color:var(--faint);}
  .task-row.done{opacity:.6;}
  .cat-tag{font-size:11px; font-weight:700; padding:3px 9px; border-radius:99px; text-transform:uppercase; letter-spacing:.4px;}
  .empty{color:var(--dim); text-align:center; padding:34px 10px; font-size:14px;}

  /* date nav */
  .datenav{display:flex; align-items:center; gap:10px;}
  .datenav .d-label{font-weight:700; min-width:210px; text-align:center;}
  .datenav .d-label small{display:block; color:var(--dim); font-weight:500; font-size:12px;}

  /* activities */
  .act-grid{grid-template-columns:repeat(2,1fr);}
  .act-card{position:relative;}
  .act-head{display:flex; align-items:flex-start; gap:12px; margin-bottom:16px;}
  .act-head .emoji{font-size:30px;}
  .act-card .total{font-size:26px; font-weight:800;}
  .act-card .unit{color:var(--dim); font-size:14px; font-weight:600;}
  .dots{display:flex; flex-wrap:wrap; gap:4px; margin:14px 0;}
  .dot{width:11px; height:11px; border-radius:3px; background:var(--input);}
  .dot.on{background:var(--accent);}
  .row-actions{display:flex; gap:7px;}
  .mini-actions{position:absolute; top:14px; right:14px; display:flex; gap:6px;}

  /* goals */
  .goal-grid{grid-template-columns:repeat(2,1fr);}
  .goal-card{position:relative; overflow:hidden;}
  .goal-card.done{border-color:var(--accent);}
  .goal-card .badge{position:absolute; top:14px; right:14px; background:var(--accent); color:#fff; font-size:11px; font-weight:800; padding:4px 10px; border-radius:99px; text-transform:uppercase; letter-spacing:.5px;}
  .goal-card h3{font-size:17px; font-weight:700; padding-right:90px;}
  .goal-card .nums{display:flex; align-items:baseline; gap:6px; margin:12px 0 4px;}
  .goal-card .cur{font-size:28px; font-weight:800;}
  .goal-card .tgt{color:var(--dim); font-size:15px;}
  .goal-card .pct{margin-left:auto; font-weight:700; font-size:14px;}
  .goal-btns{display:flex; gap:7px; margin-top:16px; flex-wrap:wrap;}
  .goal-btns .btn{flex:1; justify-content:center; min-width:52px;}

  /* lessons */
  .week-grid{display:grid; grid-template-columns:repeat(7,1fr); gap:10px;}
  .day-col{background:var(--panel); border:1px solid var(--border); border-radius:var(--radius-sm); padding:10px 9px; min-height:120px;}
  .day-col.today{border-color:var(--accent); box-shadow:0 0 0 1px var(--accent);}
  .day-col .dh{text-align:center; padding-bottom:9px; margin-bottom:9px; border-bottom:1px solid var(--border);}
  .day-col .dh .wd{font-size:12px; color:var(--dim); font-weight:700; text-transform:uppercase;}
  .day-col .dh .dn{font-size:17px; font-weight:800;}
  .day-col.today .dh .dn{color:var(--accent-2);}
  .lesson-chip{
    border-radius:9px; padding:8px 9px; margin-bottom:7px; cursor:pointer; transition:all .16s ease;
    border-left:3px solid var(--c, var(--accent)); background:color-mix(in srgb, var(--c, var(--accent)) 14%, var(--panel-2));
  }
  .lesson-chip:hover{filter:brightness(1.15);}
  .lesson-chip.done{opacity:.45;}
  .lesson-chip .lt{font-size:11px; color:var(--dim); font-weight:700; display:flex; justify-content:space-between; align-items:center;}
  .lesson-chip .ln{font-size:13px; font-weight:700; margin-top:2px; line-height:1.25;}
  .lesson-chip .lteach{font-size:11px; color:var(--dim); margin-top:2px;}
  .lesson-chip.done .ln{text-decoration:line-through;}
  .lesson-list-item{display:flex; align-items:center; gap:13px; padding:14px 16px; background:var(--panel-2); border:1px solid var(--border); border-radius:var(--radius-sm); margin-bottom:10px;}
  .lesson-list-item .emoji{font-size:24px;}
  .lesson-list-item .li-main{flex:1; min-width:0;}
  .lesson-list-item .li-name{font-weight:700;}
  .lesson-list-item .li-meta{color:var(--dim); font-size:13px; margin-top:2px;}
  .day-pills{display:flex; gap:4px; margin-top:7px;}
  .pill{width:26px; height:22px; border-radius:6px; display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:700; background:var(--input); color:var(--faint);}
  .pill.on{background:var(--c, var(--accent)); color:#fff;}
  .section-label{font-size:14px; font-weight:700; color:var(--dim); text-transform:uppercase; letter-spacing:.6px; margin:30px 0 14px;}

  /* ---------- Reminders ---------- */
  .reminder-bar{display:flex; align-items:center; justify-content:space-between; gap:14px; flex-wrap:wrap; margin-bottom:14px;}
  .reminder-bar .rb-left{display:flex; align-items:center; gap:12px;}
  .reminder-bar .rb-ic{font-size:22px;}
  .reminder-bar .rb-title{font-weight:700; font-size:15px;}
  .reminder-bar .rb-sub{color:var(--dim); font-size:12px; margin-top:2px;}
  .reminder-bar .rb-right{display:flex; align-items:center; gap:12px; flex-wrap:wrap;}
  .reminder-bar .rb-lead{display:flex; align-items:center; gap:7px; color:var(--dim); font-size:13px; font-weight:600;}
  .reminder-bar select{padding:7px 9px; background:var(--input); border:1px solid var(--border); border-radius:9px; color:var(--text); font-size:14px;}
  .reminder-bar .rb-note{font-size:13px; color:var(--dim);}
  .reminder-bar .rb-note.ok{color:var(--health); font-weight:600;}

  #toast-wrap{position:fixed; top:18px; right:18px; z-index:60; display:flex; flex-direction:column; gap:10px; max-width:340px;}
  .toast{display:flex; align-items:flex-start; gap:11px; background:var(--panel); border:1px solid var(--border); border-left:4px solid var(--c,var(--accent)); border-radius:12px; padding:13px 14px; box-shadow:0 12px 32px rgba(0,0,0,.5); animation:slidein .22s ease;}
  .toast.hide{opacity:0; transform:translateX(24px); transition:all .22s ease;}
  .toast .t-emoji{font-size:22px; line-height:1;}
  .toast .t-title{font-size:11px; font-weight:700; color:var(--dim); text-transform:uppercase; letter-spacing:.5px;}
  .toast .t-name{font-weight:700; margin-top:2px;}
  .toast .t-sub{color:var(--dim); font-size:13px; margin-top:2px;}
  .toast .t-close{margin-left:auto; color:var(--faint); font-size:14px; align-self:flex-start; padding:0 2px;}
  .toast .t-close:hover{color:var(--text);}
  @keyframes slidein{from{opacity:0; transform:translateX(24px);}to{opacity:1; transform:none;}}

  /* ---------- Modal ---------- */
  #modal-root{position:fixed; inset:0; display:none; z-index:50;}
  #modal-root.open{display:block;}
  .overlay{position:absolute; inset:0; background:rgba(5,5,10,.66); backdrop-filter:blur(3px); display:flex; align-items:flex-start; justify-content:center; padding:60px 16px; overflow-y:auto; animation:fade .15s ease;}
  .modal{width:100%; max-width:460px; background:var(--panel); border:1px solid var(--border); border-radius:var(--radius); padding:22px; animation:pop .18s ease;}
  @keyframes fade{from{opacity:0;}to{opacity:1;}}
  @keyframes pop{from{opacity:0; transform:translateY(10px) scale(.98);}to{opacity:1; transform:none;}}
  .modal-head{display:flex; align-items:center; justify-content:space-between; margin-bottom:18px;}
  .modal-head h3{font-size:18px; font-weight:800;}
  .field{display:block; margin-bottom:14px;}
  .field > span{display:block; font-size:13px; font-weight:600; color:var(--dim); margin-bottom:6px;}
  .field input, .field select{
    width:100%; padding:11px 13px; background:var(--input); border:1px solid var(--border);
    border-radius:10px; color:var(--text); font-size:15px; transition:border-color .16s ease;
  }
  .field input:focus, .field select:focus{outline:none; border-color:var(--accent);}
  .row2{display:flex; gap:12px;}
  .row2 .field{flex:1;}
  .row2 .field.small{flex:0 0 84px;}
  .modal-actions{display:flex; gap:10px; margin-top:8px;}
  .modal-actions .btn{flex:1; justify-content:center;}
  .palette{display:flex; gap:9px; flex-wrap:wrap;}
  .swatch{position:relative; cursor:pointer;}
  .swatch input{position:absolute; opacity:0;}
  .swatch span{display:block; width:30px; height:30px; border-radius:9px; background:var(--c); border:2px solid transparent; transition:transform .15s ease;}
  .swatch input:checked + span{border-color:#fff; transform:scale(1.12);}
  .days-picker{display:flex; gap:6px; flex-wrap:wrap;}
  .day-toggle{cursor:pointer;}
  .day-toggle input{position:absolute; opacity:0;}
  .day-toggle span{display:flex; align-items:center; justify-content:center; width:40px; height:38px; border-radius:9px; background:var(--input); border:1px solid var(--border); font-size:13px; font-weight:700; color:var(--dim); transition:all .15s ease;}
  .day-toggle input:checked + span{background:var(--accent); border-color:var(--accent); color:#fff;}

  /* ---------- Mobile ---------- */
  .m-top{display:none;}

  @media (max-width:760px){
    .app{flex-direction:column;}

    /* верхняя плашка: бренд + серия */
    .m-top{
      display:flex; align-items:center; justify-content:space-between;
      position:sticky; top:0; z-index:30; padding:12px 16px;
      background:rgba(12,12,20,.85); backdrop-filter:blur(10px); border-bottom:1px solid var(--border);
    }
    .m-top .brand{font-size:18px; padding:0;}
    .m-streak{font-weight:800; font-size:17px;}

    /* нижняя навигация (таб-бар) */
    .sidebar{
      position:fixed; left:0; right:0; bottom:0; top:auto; width:100%; height:auto;
      flex-direction:row; gap:0; align-self:stretch;
      padding:6px 6px calc(6px + env(safe-area-inset-bottom));
      border-right:none; border-top:1px solid var(--border);
      background:rgba(18,18,30,.94); backdrop-filter:blur(12px); z-index:40;
    }
    .sidebar .brand, .sidebar .streak-badge{display:none;}
    .sidebar nav{flex-direction:row; flex:1; gap:2px;}
    .nav-item{
      flex:1; flex-direction:column; gap:3px; justify-content:center; text-align:center;
      padding:7px 2px; font-size:10.5px; font-weight:600; border-radius:12px;
    }
    .nav-item.active{box-shadow:none; background:rgba(124,111,255,.16);}
    .nav-item .nav-ic{font-size:21px; width:auto;}

    /* контент */
    main{padding:18px 15px calc(88px + env(safe-area-inset-bottom)); max-width:100%;}
    .page-head{margin-bottom:18px;}
    .page-title{font-size:22px;}
    .hero{padding:20px;} .hero h2{font-size:19px;}
    .metrics{grid-template-columns:repeat(2,1fr); gap:11px;}
    .metric{padding:15px;} .metric .v{font-size:25px;}
    .act-grid, .goal-grid, .week-grid{grid-template-columns:1fr;}
    .datenav .d-label{min-width:0; flex:1;}

    /* модалки на узком экране */
    .overlay{padding:14px;}
    .modal{max-width:100%;}
    .row2{flex-wrap:wrap;}
    .row2 .field{flex:1 1 calc(50% - 6px);}
    .row2 .field.small{flex:0 0 80px;}

    /* бар напоминаний — в столбик */
    .reminder-bar{flex-direction:column; align-items:stretch; gap:14px;}
    .reminder-bar .rb-right{justify-content:space-between;}

    /* тосты на всю ширину */
    #toast-wrap{left:12px; right:12px; top:12px; max-width:none;}
  }
</style>
</head>
<body>
  <div class="app">
    <header class="m-top" id="m-top"></header>
    <aside class="sidebar" id="sidebar"></aside>
    <main id="main"></main>
  </div>
  <div id="modal-root"></div>

<script>
"use strict";

/* ============ Config ============ */
const STORAGE_KEY = 'summer_tracker';
const CATEGORIES = {
  sport:  { label:'Спорт',    color:'var(--sport)'  },
  study:  { label:'Учёба',    color:'var(--study)'  },
  health: { label:'Здоровье', color:'var(--health)' },
  hobby:  { label:'Хобби',    color:'var(--hobby)'  },
  other:  { label:'Другое',   color:'var(--other)'  },
};
const GOAL_COLORS   = ['#7c6fff','#38bdf8','#4ade80','#ff6b9d','#fbbf24','#f97316'];
const LESSON_COLORS = ['#7c6fff','#38bdf8','#4ade80','#ff6b9d','#fbbf24','#f97316','#a78bfa','#2dd4bf'];
const WEEKDAYS      = ['Пн','Вт','Ср','Чт','Пт','Сб','Вс'];
const WEEKDAYS_FULL = ['Понедельник','Вторник','Среда','Четверг','Пятница','Суббота','Воскресенье'];
const MONTHS = ['января','февраля','марта','апреля','мая','июня','июля','августа','сентября','октября','ноября','декабря'];

/* ============ Helpers ============ */
const pad = n => String(n).padStart(2,'0');
const ymd = d => `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
const parseYMD = s => { const [y,m,d] = s.split('-').map(Number); return new Date(y,m-1,d); };
const addDays = (d,n) => { const x = new Date(d); x.setDate(x.getDate()+n); return x; };
const mondayIndex = d => (d.getDay()+6)%7;            // 0=Пн … 6=Вс
const startOfWeek = d => addDays(d, -mondayIndex(d));
const todayYMD = () => ymd(new Date());
const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2,7);
const esc = s => String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const fmtNum = n => (Math.round(n*100)/100).toString();

function prettyDate(d){ return `${d.getDate()} ${MONTHS[d.getMonth()]} ${d.getFullYear()}`; }

/* ============ State ============ */
let state, view = 'home', taskDate = todayYMD(), weekStart = ymd(startOfWeek(new Date()));

function normalize(s){
  s.tasks       = s.tasks       || [];
  s.checks      = s.checks      || {};
  s.activities  = s.activities  || [];
  s.goals       = s.goals       || [];
  s.lessons     = s.lessons     || [];
  s.lessonChecks= s.lessonChecks|| {};
  s.settings    = s.settings    || {};
  if(typeof s.settings.reminderLead !== 'number') s.settings.reminderLead = 15;
  s.notified    = s.notified    || {};
  const t = todayYMD();                                   // dedup-память для напоминаний — храним только сегодня
  Object.keys(s.notified).forEach(d => { if(d !== t) delete s.notified[d]; });
  return s;
}
function seed(){
  return {
    tasks:[
      {id:uid(), name:'Зарядка',              emoji:'🏃', category:'sport'},
      {id:uid(), name:'Чтение 30 минут',      emoji:'📚', category:'study'},
      {id:uid(), name:'Выпить 2 литра воды',  emoji:'💧', category:'health'},
    ],
    checks:{},
    activities:[
      {id:uid(), name:'Бег',    emoji:'🏃‍♂️', category:'sport', unit:'км',  sessions:[]},
      {id:uid(), name:'Гитара', emoji:'🎸',    category:'hobby', unit:'мин', sessions:[]},
    ],
    goals:[
      {id:uid(), name:'Прочитать книг',     target:10,  current:2,   unit:'шт',   color:'#7c6fff'},
      {id:uid(), name:'Пробежать за лето',  target:100, current:15,  unit:'км',   color:'#38bdf8'},
      {id:uid(), name:'Выучить новых слов', target:500, current:120, unit:'слов', color:'#4ade80'},
    ],
    lessons:[], lessonChecks:{},
  };
}
function load(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(raw) return normalize(JSON.parse(raw));
  }catch(e){ console.warn('Не удалось прочитать данные:', e); }
  return normalize(seed());
}
function save(){ try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }catch(e){ console.warn(e); } }

/* ============ Computed ============ */
function allTasksDone(dateStr){
  if(state.tasks.length === 0) return false;
  const done = state.checks[dateStr] || [];
  return state.tasks.every(t => done.includes(t.id));
}
function computeStreak(){
  let streak = 0, guard = 0;
  let cur = new Date();
  if(allTasksDone(ymd(cur))) streak++;        // today counts if fully done
  cur = addDays(cur, -1);                     // today incomplete -> don't break, look back
  while(allTasksDone(ymd(cur)) && guard < 400){ streak++; cur = addDays(cur, -1); guard++; }
  return streak;
}
function summerInfo(){
  const now = new Date(), y = now.getFullYear(), DAY = 86400000;
  const start = new Date(y,5,1), end = new Date(y,7,31);
  const today0 = new Date(y, now.getMonth(), now.getDate());
  const total = Math.round((end-start)/DAY)+1;
  let passed, remaining;
  if(today0 < start){ passed = 0; remaining = total; }
  else if(today0 > end){ passed = total; remaining = 0; }
  else { passed = Math.round((today0-start)/DAY)+1; remaining = Math.round((end-today0)/DAY); }
  return { total, passed, remaining, pct: Math.round(passed/total*100), year:y };
}

function plural(n, one, few, many){
  const m10 = n%10, m100 = n%100;
  if(m10===1 && m100!==11) return one;
  if(m10>=2 && m10<=4 && (m100<10 || m100>=20)) return few;
  return many;
}

function openModal(title, bodyHtml, onSubmit){
  const root = document.getElementById('modal-root');
  root.innerHTML = `
    <div class="overlay">
      <div class="modal" role="dialog" aria-modal="true">
        <div class="modal-head"><h3>${esc(title)}</h3><button class="icon-btn" data-action="close-modal" aria-label="Закрыть">✕</button></div>
        <form id="modal-form">
          ${bodyHtml}
          <div class="modal-actions">
            <button type="button" class="btn ghost" data-action="close-modal">Отмена</button>
            <button type="submit" class="btn primary">Сохранить</button>
          </div>
        </form>
      </div>
    </div>`;
  root.classList.add('open');
  const form = document.getElementById('modal-form');
  form.addEventListener('submit', e => { e.preventDefault(); onSubmit(new FormData(form), form); });
  setTimeout(() => { const i = form.querySelector('input:not([type=radio]):not([type=checkbox]), select'); if(i) i.focus(); }, 40);
}
function closeModal(){ const r = document.getElementById('modal-root'); r.classList.remove('open'); r.innerHTML = ''; }

}

  return `<div class="palette">${colors.map((c,i) =>
    `<label class="swatch" style="--c:${c}"><input type="radio" name="${name}" value="${c}" ${(selected?selected===c:i===0)?'checked':''}><span></span></label>`).join('')}</div>`;

      <label class="field"><span>Длительность (мин)</span><input name="duration" type="number" min="5" step="5" required value="${l?l.duration:60}"></label>
    </div>
    <label class="field"><span>Дни недели</span>${daysPicker(l?l.days:[])}</label>
    <label class="field"><span>Цвет</span>${colorPalette('color', LESSON_COLORS, l?l.color:null)}</label>
  `, (fd, form) => {
    const days = [...form.querySelectorAll('input[name="day"]:checked')].map(c=>Number(c.value));
    if(days.length === 0){ alert('Выбери хотя бы один день недели.'); return; }
    const data = {
      subject:(fd.get('subject')||'').trim()||'Урок',
      emoji:(fd.get('emoji')||'').trim()||'📘',
      teacher:(fd.get('teacher')||'').trim(),
      time:fd.get('time')||'00:00',
      duration:Math.max(5, Number(fd.get('duration'))||60),
      days,
      color:fd.get('color')||LESSON_COLORS[0],
    };
    if(l){ Object.assign(l, data); }
    else { state.lessons.push({ id:uid(), ...data }); }
    save(); closeModal(); render();
  });
}

/* ============ Actions ============ */
function toggleTask(id){
  const d = taskDate;
  const arr = state.checks[d] = state.checks[d] || [];
  const i = arr.indexOf(id);
  if(i >= 0) arr.splice(i,1); else arr.push(id);
  if(arr.length === 0) delete state.checks[d];
  save(); render();
}
function deleteTask(id){
  const t = state.tasks.find(x=>x.id===id);
  if(!confirm(`Удалить задачу «${t?t.name:''}»? Она исчезнет из всех дней.`)) return;
  state.tasks = state.tasks.filter(x=>x.id!==id);
  Object.keys(state.checks).forEach(d => {
    state.checks[d] = state.checks[d].filter(x=>x!==id);
    if(state.checks[d].length === 0) delete state.checks[d];
  });
  save(); render();
}
function recordActivity(id){
  const a = state.activities.find(x=>x.id===id); if(!a) return;
  const raw = prompt(`Сколько записать?${a.unit?' ('+a.unit+')':''}`, '1');
  if(raw === null) return;
  const v = parseFloat(String(raw).replace(',','.'));
  if(isNaN(v)){ alert('Введите число.'); return; }
  a.sessions.push({ date: todayYMD(), value: v });
  save(); render();
}
function deleteActivity(id){
  const a = state.activities.find(x=>x.id===id);
  if(!confirm(`Удалить занятие «${a?a.name:''}» вместе со всеми записями?`)) return;
  state.activities = state.activities.filter(x=>x.id!==id);
  save(); render();
}
function goalChange(id, delta){
  const g = state.goals.find(x=>x.id===id); if(!g) return;
  g.current = Math.max(0, (Number(g.current)||0) + delta);
  save(); render();
}
function goalCustom(id){
  const raw = prompt('На сколько увеличить прогресс?', '1');
  if(raw === null) return;
  const v = parseFloat(String(raw).replace(',','.'));
  if(isNaN(v)){ alert('Введите число.'); return; }
  goalChange(id, v);
}
function deleteGoal(id){
  const g = state.goals.find(x=>x.id===id);
  if(!confirm(`Удалить цель «${g?g.name:''}»?`)) return;
  state.goals = state.goals.filter(x=>x.id!==id);
  save(); render();
}
function toggleLesson(id, date){
  const arr = state.lessonChecks[date] = state.lessonChecks[date] || [];
  const i = arr.indexOf(id);
  if(i >= 0) arr.splice(i,1); else arr.push(id);
  if(arr.length === 0) delete state.lessonChecks[date];
  save(); render();
}
function deleteLesson(id){
  const l = state.lessons.find(x=>x.id===id);
  if(!confirm(`Удалить урок «${l?l.subject:''}»?`)) return;
  state.lessons = state.lessons.filter(x=>x.id!==id);
  Object.keys(state.lessonChecks).forEach(d => {
    state.lessonChecks[d] = state.lessonChecks[d].filter(x=>x!==id);
    if(state.lessonChecks[d].length === 0) delete state.lessonChecks[d];
  });
  save(); render();
}

/* ============ Reminders (работают, пока вкладка открыта) ============ */
function notifBtn(){
  if(!('Notification' in window)) return `<span class="rb-note">Браузер не поддерживает уведомления</span>`;
  if(Notification.permission === 'granted') return `<span class="rb-note ok">✓ Уведомления браузера включены</span>`;
  if(Notification.permission === 'denied')  return `<span class="rb-note">Уведомления заблокированы в браузере</span>`;
  return `<button class="btn ghost sm" data-action="enable-notif">Включить уведомления браузера</button>`;
}
function setLead(v){ state.settings.reminderLead = Number(v) || 15; save(); }
function enableNotif(){
  if(!('Notification' in window)) return;
  Notification.requestPermission().then(() => { if(view === 'lessons') render(); });
}
function showToast(emoji, title, sub, color){
  let wrap = document.getElementById('toast-wrap');
  if(!wrap){ wrap = document.createElement('div'); wrap.id = 'toast-wrap'; document.body.appendChild(wrap); }
  const t = document.createElement('div');
  t.className = 'toast';
  t.style.setProperty('--c', color || 'var(--accent)');
  t.innerHTML = `<span class="t-emoji">${esc(emoji||'📘')}</span>
    <div class="t-body"><div class="t-title">⏰ Скоро урок</div><div class="t-name">${esc(title)}</div><div class="t-sub">${esc(sub)}</div></div>
    <button class="t-close" aria-label="Закрыть">✕</button>`;
  t.querySelector('.t-close').addEventListener('click', () => t.remove());
  wrap.appendChild(t);
  setTimeout(() => { t.classList.add('hide'); setTimeout(() => t.remove(), 250); }, 12000);
}
function fireReminder(l, mins){
  const when = mins <= 0 ? 'сейчас' : `через ${mins} ${plural(mins,'минуту','минуты','минут')}`;
  const tail = `${l.time}${l.teacher ? ' · '+l.teacher : ''} · ${l.duration} мин`;
  showToast(l.emoji, l.subject, `${when}, в ${tail}`, l.color);
  if('Notification' in window && Notification.permission === 'granted'){
    try{ new Notification(`⏰ Скоро урок: ${l.subject}`, { body: `${when}, в ${tail}` }); }catch(e){}
  }
}
function checkReminders(){
  const lead = state.settings.reminderLead || 15;
  const now = new Date(), todayStr = ymd(now), wd = mondayIndex(now);
  state.notified = state.notified || {};
  Object.keys(state.notified).forEach(d => { if(d !== todayStr) delete state.notified[d]; });
  const done = state.notified[todayStr] = state.notified[todayStr] || [];
  let changed = false;
  state.lessons.forEach(l => {
    if(!(l.days||[]).includes(wd) || !l.time || done.includes(l.id)) return;
    const [h,m] = l.time.split(':').map(Number);
    const start = new Date(now.getFullYear(), now.getMonth(), now.getDate(), h, m||0, 0, 0);
    const diff = (start - now) / 60000;
    if(diff >= 0 && diff <= lead){ done.push(l.id); changed = true; fireReminder(l, Math.round(diff)); }
  });
  if(changed) save();
}

/* ============ Event delegation ============ */
document.addEventListener('click', e => {
  const el = e.target.closest('[data-action]');
  if(!el){ if(e.target.classList.contains('overlay')) closeModal(); return; }
  const a = el.dataset.action, id = el.dataset.id;
  switch(a){
    case 'nav':
      view = el.dataset.view;
      if(view === 'tasks') taskDate = todayYMD();
      if(view === 'lessons') weekStart = ymd(startOfWeek(new Date()));
      render(); window.scrollTo(0,0); break;
    case 'close-modal': closeModal(); break;

    case 'add-task': taskForm(); break;
    case 'toggle-task': toggleTask(id); break;
    case 'delete-task': deleteTask(id); break;
    case 'task-prev': taskDate = ymd(addDays(parseYMD(taskDate),-1)); render(); break;
    case 'task-next': taskDate = ymd(addDays(parseYMD(taskDate), 1)); render(); break;
    case 'task-today': taskDate = todayYMD(); render(); break;

    case 'add-activity': activityForm(); break;
    case 'edit-activity': activityForm(id); break;
    case 'delete-activity': deleteActivity(id); break;
    case 'record-activity': recordActivity(id); break;

    case 'add-goal': goalForm(); break;
    case 'edit-goal': goalForm(id); break;
    case 'delete-goal': deleteGoal(id); break;
    case 'goal-inc': goalChange(id, Number(el.dataset.amt)||1); break;
    case 'goal-dec': goalChange(id, -1); break;
    case 'goal-custom': goalCustom(id); break;

    case 'add-lesson': lessonForm(); break;
    case 'edit-lesson': lessonForm(id); break;
    case 'delete-lesson': deleteLesson(id); break;
    case 'toggle-lesson': toggleLesson(id, el.dataset.date); break;
    case 'week-prev': weekStart = ymd(addDays(parseYMD(weekStart),-7)); render(); break;
    case 'week-next': weekStart = ymd(addDays(parseYMD(weekStart), 7)); render(); break;
    case 'week-this': weekStart = ymd(startOfWeek(new Date())); render(); break;

    case 'enable-notif': enableNotif(); break;
  }
});
document.addEventListener('change', e => {
  const el = e.target.closest('[data-action="set-lead"]');
  if(el) setLead(el.value);
});
document.addEventListener('keydown', e => { if(e.key === 'Escape') closeModal(); });

/* ============ Boot ============ */
state = load();
save();          // persist seed on first run
render();
checkReminders();                       // проверяем сразу при открытии
setInterval(checkReminders, 30000);     // и далее раз в 30 секунд
</script>
</body>
</html>
